<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Personality Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">Virtual Personality Room</h1>
<p class="subtitle">They watch. They feel. They react.</p>

<div class="room">

        <div class="face happy"></div>
        <p class="name">Calm 😄</p>
        <p class="speech"></p>
    </div>

    <div class="character" id="char2">
        <div class="face happy"></div>
        <p class="name">Emotional 😢</p>
        <p class="speech"></p>
    </div>

    <div class="character" id="char3">
        <div class="face happy"></div>
        <p class="name">Aggressive 😡</p>
        <p class="speech"></p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
