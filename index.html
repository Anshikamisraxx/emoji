<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji AI System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Emoji 1 -->
    <div class="emoji-box">
        <div class="face happy">
            <div class="eyes">
                <div class="eye"><div class="pupil"></div></div>
                <div class="eye"><div class="pupil"></div></div>
            </div>
            <div class="mouth"></div>
        </div>
        <p class="speech">Hey 😄</p>
    </div>

    <!-- Emoji 2 -->
    <div class="emoji-box">
        <div class="face happy">
            <div class="eyes">
                <div class="eye"><div class="pupil"></div></div>

            </div>
            <div class="mouth"></div>
        </div>
        <p class="speech">Hi 👀</p>
    </div>

    <!-- Emoji 3 -->
    <div class="emoji-box">
        <div class="face happy">
            <div class="eyes">
                <div class="eye"><div class="pupil"></div></div>

            </div>
            <div class="mouth"></div>
        </div>
        <p class="speech">Hello 😏</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
